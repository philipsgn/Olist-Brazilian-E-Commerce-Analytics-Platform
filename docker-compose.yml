version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: de_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: de_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  airflow-common: &airflow-common
    build:
      context: .
      dockerfile: Dockerfile.airflow
    env_file: .env
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      &airflow-common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ecommerce_db
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ecommerce_db
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./ingestion:/opt/airflow/ingestion
      - ./dbt_project:/opt/airflow/dbt_project
      - ./tmp:/opt/airflow/tmp

  airflow-webserver:
    <<: *airflow-common
    container_name: de_airflow_webserver
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin123 && airflow webserver"

  airflow-scheduler:
    <<: *airflow-common
    container_name: de_airflow_scheduler
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: "airflow scheduler"

  airflow-worker:
    <<: *airflow-common
    container_name: de_airflow_worker
    depends_on:
      airflow-scheduler: { condition: service_started }
    command: "airflow celery worker"

  superset:
    image: apache/superset
    container_name: de_superset
    restart: unless-stopped
    user: "root" # Ensure write permission to the mounted superset_home volume
    ports:
      - "8088:8088"
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-YOUR_SUPER_SECRET_KEY_PROD_12345}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin123}
      POSTGRES_PORT: "5432" # Override .env's POSTGRES_PORT=5433 so it connects using Internal Docker port
    env_file: .env
    volumes:
      - ./superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    command: >
      bash -c "pip install psycopg2-binary --target /app/.venv/lib/python3.10/site-packages &&
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname Superset --email admin@example.com --password \"$${ADMIN_PASSWORD}\" &&
      superset init &&
      gunicorn -w 2 --timeout 120 -b 0.0.0.0:8088 --limit-request-line 0 --limit-request-field_size 0 \"superset.app:create_app()\""

volumes:
  postgres_data:
