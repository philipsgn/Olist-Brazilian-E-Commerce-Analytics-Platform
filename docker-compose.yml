version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: de_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: de_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  airflow-webserver:
    build: .
    container_name: de_airflow_webserver
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./ingestion:/opt/airflow/ingestion
      - ./dbt_project:/opt/airflow/dbt_project
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin123 && airflow webserver"

  airflow-scheduler:
    build: .
    container_name: de_airflow_scheduler
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./ingestion:/opt/airflow/ingestion
    command: "airflow scheduler"

  airflow-worker:
    build: .
    container_name: de_airflow_worker
    depends_on:
      airflow-scheduler: { condition: service_started }
    env_file: .env
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./ingestion:/opt/airflow/ingestion
    command: "airflow worker"

volumes:
  postgres_data:
