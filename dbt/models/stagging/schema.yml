### Phase 4 — Data Warehouse Design (Tuần 4)

Đây là phần **quan trọng nhất** để show kỹ năng DE. Thiết kế star schema:
```
fact_order_items          dim_customers
├── order_item_id         ├── customer_id
├── order_id (FK)         ├── customer_city
├── product_id (FK)       └── customer_state
├── seller_id (FK)
├── customer_id (FK)      dim_products
├── price                 ├── product_id
├── freight_value         ├── product_category
└── order_date_id (FK)    └── product_weight_g

                          dim_date
                          ├── date_id
                          ├── year, month, day
                          ├── quarter
                          └── is_weekend