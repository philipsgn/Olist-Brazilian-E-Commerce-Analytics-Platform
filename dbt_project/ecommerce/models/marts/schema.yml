version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_date
    columns:
      - name: date_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_geolocation
    columns:
      - name: zip_code_prefix
        tests:
          - not_null

  - name: fact_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null

  - name: fact_payments
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: payment_total

  - name: mart_revenue_daily
    columns:
      - name: gross_revenue
