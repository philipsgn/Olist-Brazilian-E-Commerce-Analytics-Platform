version: 2

models:
  - name: fact_order_items
    description: "Granular table containing all items within an order. One row per item."
    columns:
      - name: order_id
        description: "Unique identifier for the order."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: order_item_id
        description: "Sequential identifier for items within the same order."
        tests:
          - not_null

      - name: product_id
        description: "Identifier for the product."
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: price
        description: "Selling price of the item."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false

      - name: freight_value
        description: "Shipping cost for the item."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: dim_customers
    description: "Customer dimensional table with location details."
    columns:
      - name: customer_id
        description: "Primary key for the customer."
        tests:
          - unique
          - not_null

      - name: customer_unique_id
        description: "Unique identifier for the physical customer (persists across orders)."
        tests:
          - not_null

      - name: customer_zip_code_prefix
        tests:
          - not_null

  - name: dim_products
    description: "Product dimensional table with translated categories."
    columns:
      - name: product_id
        description: "Primary key for the product."
        tests:
          - unique
          - not_null

      - name: product_category
        description: "English translation of the product category."
        tests:
          - not_null
